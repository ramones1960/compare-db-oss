services:
  app:
    build:
      context: .
      # ビルド時のプロキシをホストのシェル環境変数から受け取る（未設定なら空）
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
        http_proxy: ${http_proxy:-}
        https_proxy: ${https_proxy:-}
        no_proxy: ${no_proxy:-localhost,127.0.0.1}
    container_name: cmp-app
    # 各DBコンテナは別 compose で起動し、ホストにポートを公開している。
    # network_mode: host で localhost:<port> 経由で各DBに到達する（Linux）。
    network_mode: host
    environment:
      DB_HOST: localhost
      DB_USER: ${DB_USER:-admin}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      DB_NAME: ${DB_NAME:-benchdb}
      OPENSEARCH_PASSWORD: ${OPENSEARCH_PASSWORD:-Zx9!qWeRt#Uk7mp2}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jPass123}
      APP_DATA_DIR: /app/data
      # 画面からの DB 起動/停止に使う。リポジトリをホストと同一パスでマウントするため、
      # その絶対パスを渡す（make app が $(CURDIR) を設定。未設定なら /repo を既定にする）。
      HOST_REPO_ROOT: ${HOST_REPO_ROOT:-/repo}
      # 実行時: localhost の DB 接続はプロキシを経由させない
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
      no_proxy: ${no_proxy:-localhost,127.0.0.1}
    volumes:
      - ./data:/app/data   # SQLite / DuckDB の永続化（組込のためアプリ内で動作）
      # 画面から各DBを起動/停止するため docker ソケットを共有する（検証/学習用）。
      - /var/run/docker.sock:/var/run/docker.sock
      # リポジトリを「ホストと同一の絶対パス」でマウントする。各DBの compose は
      # ./init 等の相対バインドマウントを使うため、ホスト docker デーモンから見て
      # 同じパスに解決される必要がある。make app が HOST_REPO_ROOT=$(CURDIR) を渡す。
      - ${HOST_REPO_ROOT:-..}:${HOST_REPO_ROOT:-/repo}
