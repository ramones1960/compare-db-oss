<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>compare-db-oss · マルチDB シナリオ比較</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .sc-card { max-width: 900px; }
    .sc-dbs { margin: 8px 0 12px; display: flex; flex-wrap: wrap; gap: 6px; font-size: 12.5px; }
    .db-chip {
      padding: 2px 10px; border-radius: 12px; border: 1px solid;
      font-weight: 500; font-size: 12px;
    }
    .sc-results { margin-top: 12px; }
    .sc-results-title { font-size: 13px; font-weight: 600; color: #0f2540; margin-bottom: 10px; }
    .sc-result-row {
      display: grid; grid-template-columns: 130px 1fr auto;
      gap: 10px; align-items: center; margin-bottom: 8px;
    }
    .sc-db-label { font-size: 13px; font-weight: 600; text-align: right; white-space: nowrap; }
    .sc-bar-wrap { background: #f1f5f9; border-radius: 6px; min-height: 28px; display: flex; align-items: center; }
    .sc-bar {
      min-height: 28px; border-radius: 6px; display: flex; align-items: center;
      padding: 0 10px; transition: width .3s; font-size: 12.5px;
    }
    .sc-status { font-size: 11.5px; color: #64748b; white-space: nowrap; max-width: 280px; overflow: hidden; text-overflow: ellipsis; }
    .sc-note { font-style: italic; color: #64748b; }
    .err-text { color: #b91c1c; }
    .sc-detail { margin: 0 0 12px 140px; }
    .sc-detail summary { font-size: 12px; color: #64748b; cursor: pointer; margin-bottom: 6px; }
    .sc-running { padding: 8px 0; }
    .sc-db-row { display: flex; align-items: center; gap: 10px; padding: 4px 0; font-size: 13px; }
    .sc-db-name { font-weight: 500; min-width: 100px; }
    .sc-timing { color: #64748b; font-size: 12px; }
    .page-desc { max-width: 700px; font-size: 13.5px; color: #334155; line-height: 1.6; margin-bottom: 24px; }
    .back-link { font-size: 13px; color: #4f46e5; text-decoration: none; margin-bottom: 16px; display: inline-block; }
    .back-link:hover { text-decoration: underline; }
    .msg.err { padding: 8px 12px; border-radius: 6px; font-size: 13px;
               background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>compare-db-oss <span>マルチDB シナリオ比較</span></h1>
    <a href="/" style="color:#fff;font-size:13px;text-decoration:none">← 操作コンソール</a>
  </header>
  <div style="padding: 24px 32px; overflow-y: auto; max-height: calc(100vh - 53px);">
    <p class="page-desc">
      同一の業務シナリオ（EC 注文管理）を複数の DB で並行実行し、
      <strong>実装の違い・処理時間の差</strong>を横断比較します。
      各 DB の得意・不得意が一目でわかります。
      事前に比較したい DB を起動してください（未接続の DB は自動でスキップされます）。
    </p>
    <div id="sc-panel">
      <p class="hint">読み込み中…</p>
    </div>
  </div>
  <script src="/scenarios.js"></script>
</body>
</html>
