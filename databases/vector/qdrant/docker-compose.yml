services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: cmp-qdrant
    ports:
      - "${QDRANT_PORT:-6333}:6333"   # REST
      - "6334:6334"                    # gRPC
    volumes:
      - qdrantdata:/qdrant/storage
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  qdrantdata:
