# SQLite は組込DB（サーバプロセスなし）。
# 検証用に CLI を備えたコンテナを常駐させ、exec で操作する。
services:
  sqlite:
    image: keinos/sqlite3:latest
    container_name: cmp-sqlite
    command: ["tail", "-f", "/dev/null"]
    working_dir: /work
    volumes:
      - ./data:/work/data
      - ./init:/work/init:ro
      - ./examples:/work/examples:ro
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
