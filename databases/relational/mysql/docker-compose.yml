services:
  mysql:
    image: mysql:8.4
    container_name: cmp-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-benchdb}
      MYSQL_USER: ${DB_USER:-admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-changeme}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - mysqldata:/var/lib/mysql
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD:-changeme}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysqldata:
