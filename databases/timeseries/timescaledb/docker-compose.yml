services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: cmp-timescaledb
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-benchdb}
    ports:
      - "${TIMESCALEDB_PORT:-5433}:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d:ro
      - tsdata:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-admin}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tsdata:
