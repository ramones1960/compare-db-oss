services:
  neo4j:
    image: neo4j:5
    container_name: cmp-neo4j
    environment:
      # Neo4j はユーザ名が neo4j 固定・パスワード8文字以上。共通の DB_* とは別管理。
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:-neo4jPass123}"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4jdata:/data
      - ./init:/init:ro
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  neo4jdata:
