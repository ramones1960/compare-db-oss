services:
  opensearch:
    image: opensearchproject/opensearch:2
    container_name: cmp-opensearch
    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms2g -Xmx2g"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${DB_PASSWORD:-Changeme123!}
      DISABLE_SECURITY_PLUGIN: "false"
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    volumes:
      - osdata:/usr/share/opensearch/data
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8g
    healthcheck:
      test: ["CMD-SHELL", "curl -sk -u admin:${DB_PASSWORD:-Changeme123!} https://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

volumes:
  osdata:
